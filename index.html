<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scan and Bar Code Scanner</title>
<!--script src="https://unpkg.com/html5-qrcode"></script-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="html5Qr.js"></script>
<style>
    
*{
margin:0;
padding:0;
box-sizing:border-box;
}
    
body {
font-family: sans-serif;
display:flex;
flex-direction: column;
align-items: center;
padding: 5px; 
background: #f4f4f9;
align-items:center;
}
    
.container{
width:330px;
display:flex;
flex-direction:column;
background:#ddd;
text-align:center;
align-items: center;
border-radius:10px ;
padding:10px;  
border:1px solid #ccc;                
}
    
    
#reader { 
background:;
width: 100%;
border-radius: 8px; 
overflow: hidden; 
}

.result-container { 
margin-top: 10px;
margin-bottom: 5px;
width: 100%; 
text-align: center;
}
    
#result-text { 
width: 100%;
padding: 5px; 
border: 1.5px solid teal; 
border-radius: 5px; 
background: ; 
min-height: 40px;
word-break: break-all;
margin-left:auto;
margin-right:auto;
overflow-y:auto;
resize:none;
}
            
#result-text:focus{
outline:none;            
}
            
.btn-group{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;  
gap:5px;            
width:100%;            
    }            
            
            
    
.btn-container{            
display:flex;
flex-direction:row;
justify-content:center;
align-items:center;    
column-gap:5px;
width:100%;
    }
            
.btn {
padding:10px 20px;
cursor: pointer;
background: #007bff;
color: white;
border: none;
border-radius: 4px; 
font-weight: bold; 
width:50%;      
}            
            
    
button {
padding:10px 20px;
cursor: pointer;
background: #007bff;
color: white;
border: none;
border-radius: 4px; 
font-weight: bold; 
}
    
button:focus {
background: #0056b3;
outline:none;    
}
    

            
footer{
margin:10px 0px 0px 0px;    
font-size:15px;
/*color: #007bff;*/
}
    
</style>
</head>
<body>
 <div class="container">   
  <h2>Scan QR / Barcode</h2>
    <div id="reader"></div>
        <div class="result-container">
        <textarea readonly="" rows="2" cols="5" id="result-text">Note: Open Chrome (recomended)</textarea>
        </div>              
        <div class="btn-group">   
        <div class="btn-container">
        <button class="btn" id="copy-btn"><i class="fas fa-clipboard"></i> Copy</button>
        <button class="btn" id="" onclick="btnChrome()" ><i class="fab fa-chrome"></i> Open Chrome</button>            
        </div>              
        <div class="btn-container">
        <button class="btn-bottom" style="width:100%"  onclick="window.location='scanner.html'"><i class="fas fa-qrcode"></i> From File</button>                       
        </div>               
        </div>         
        <footer>
       <i style="color:purple ">Create by: Nel Olino</i> <i class="fas fa-smile"style="color:purple"></i> 
     </footer>                    
   </div>
<script>        
let resultElement = document.getElementById('result-text');
let copyBtn = document.getElementById('copy-btn');
let statusMsg = document.getElementById('status');

// 1. Initialize the Scanner
const html5QrCode = new Html5Qrcode("reader");
const config = { fps: 10, qrbox: { width: 250, height: 250 } };

// Start scanning using the back camera
html5QrCode.start(
{ facingMode: "environment" }, 
config, 
(decodedText) => {
resultElement.innerText = decodedText;
             
//Auto Redirect Start
if (decodedText.startsWith('http://') || decodedText.startsWith('https://')) {
// Redirect sa URL
window.location.href = decodedText;
}  
            
//Auto Redirect End                                
},
(errorMessage) => {
}
);
        
let inText = resultElement.innerText
copyBtn.addEventListener('click', () => {
var text = document.getElementById('result-text').value;
      
if (text && text !== "Scanned text will appear here...") {
navigator.clipboard.writeText(text).then(() => {
copyBtn.innerText = 'Copied';
setTimeout(() => copyBtn.innerHTML= `<p><i class="fas fa-clipboard"></i> Copy</p>`,2000)
});
}
});
                
function btnChrome(url) {
window.location.href ="intent://nelolino1-gif.github.io/Qr#Intent;scheme=http;package=com.android.chrome;end"
            
}
   </script>
 </div>
</body>
</html>
