<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dynamic Sum Calculator</title>    
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    
<style>
*{
padding:0;
margin:0;
box-sizing:border-box;
}
body {
display :flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family: sans-serif; 
padding:0; 
background-color:#f4f4f9; 
}
    
.container{
padding :5px;    
margin:20px 0px 0px 0px;          
width:330px;
display :flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:10px;
border:1.5px solid seagreen;  
background:#ddd; 
           
}
    
h2{
margin:10px 0px;    
}    
 
#container{
 width:100%;   
}
 
.controls {
 width:100%;   
background:none;
display:flex;
flex-direction:row;
justify-content:center;            
margin-bottom: 10px;
gap:0;
}
    
.input-wrapper {    
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin-bottom: 10px;
width: 100%;
}
    
input { 
padding: 10px;
border: 1.5px solid teal;
border-radius:10px;
width: 90%;
font-size:15px;
text-align:center;
}
        
input:focus{
outline:2px solid #ccc;
border:1.5px solid tomato;
}
    
    
button {
padding:10px;
width:45%;
cursor: pointer;
border: none; 
border-radius:10px;
color: white;
font-size:15px;
}
 
 
 
button:focus{
outline:1.5px solid #ccc;
border:none; 
}
    
.btn-add {
background-color:#28a745; 
}
    
.btn-remove {
background-color: #dc3545; 
}
        
.result-box {
width: 89%;
border:1.5px solid lightseagreen; 
padding:7px;
border-radius:10px;
margin-top: 10px 0px 0px 0px; 
font-size:1rem;
color: brown; 
font-weight:bold; 
background:lightseagreen;
text-align:center;
margin-bottom:5px;

}
 
#total {
font-size:1.2rem;
/*  color: #007bff;*/
color: #fff;
}
    
footer{
margin:10px 0px;    
font-size:15px;
/*color: #007bff;*/
}
    </style>
</head>
<body>
<div class="container">
    <h2>Dynamic Sum Calculator</h2>
    <div class="controls">
        <button style="border-radius : 10px 0px 0px 10px" class="btn-add" onclick="addField()">+ Add Input</button>
        <button style="border-radius : 0px 10px 10px 0px" class="btn-remove" onclick="removeLastField()">- Remove Last</button>
    </div>
    <div id="container">
        <div class="input-wrapper">
        <input type="number" class="val-input" value="" oninput="calculateTotal()">
        </div>
    </div>
    <div class="result-box">
        Total: <span id="total">0</span>
    </div>
    <footer >
        <i style="color:purple ">Create by: Nel Olino</i> <i class="fas fa-smile"style="color:purple"></i>
    </footer>
  </div>
<script>
const container = document.getElementById('container');
const totalDisplay = document.getElementById('total');

function addField() {
const div = document.createElement('div');
div.className = 'input-wrapper';
div.innerHTML = '<input type="number" class="val-input" value="" oninput="calculateTotal()">';
container.appendChild(div);
calculateTotal(); // Update total after adding
            
}

function removeLastField() {
const fields = container.getElementsByClassName('input-wrapper');
// Keep at least one input field
if (fields.length > 0) {
container.removeChild(fields[fields.length - 1]);
calculateTotal(); // Update total after removing
}
}

function calculateTotal() {
let sum = 0;
const inputs = document.querySelectorAll('.val-input');
            
inputs.forEach(input => {
const val = parseFloat(input.value) || 0;
sum += val;
});

totalDisplay.innerText = sum.toLocaleString();
}
</script>
</body>
</html>
