<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Sum Calculator</title>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    
    <style>
*{
padding:0;
margin:0;
box-sizing:border-box;
}
body {
display :flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family: sans-serif; 
padding:0; 
background-color:#f4f4f9; 
}
    
.container{
padding :10px;    
margin:20px 0px 0px 0px;          
width:330px;
display :flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:8px;
border:1.5px solid seagreen;    
           
}
    
h2{
margin:5px 0px;    
}    
#container{
 width:100%;   
}
.controls {
 width:100%;   
background:;
display:flex;
flex-direction:row;
justify-content:center;            
margin-bottom: 10px;
gap:10px;
}
    
.input-wrapper {    
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin-bottom: 10px;
width: 100%;
}
    
input { 
padding: 8px;
border: 1.5px solid teal;
border-radius:3px;
width: 93.5%;
font-size:15px;
text-align:center;
}
        
input:focus{
outline:none;
border:1.5px solid tomato;
}
    
    
button {
padding:8px;
width:45%;
cursor: pointer;
border: none; 
border-radius:3px;
color: white;
font-size:15px;
}
    
.btn-add {
background-color:#28a745; 
}
    
.btn-remove {
background-color: #dc3545; 
}
        
.result-box {
margin-top: 0px 10px 0px 0px; 
font-weight: bold; 
font-size:1.5rem;
}
#total {
font-size:1.5rem;
/*  color: #007bff;*/
color: lightseagreen;
}
    
footer{
margin:5px;    
font-size:15px;
/*  color: #007bff;*/
}
    </style>
</head>
<body>
<div class="container">
    <h2>Dynamic Sum Calculator</h2>

    <div class="controls">
        <button class="btn-add" onclick="addField()">+ Add Input</button>
        <button class="btn-remove" onclick="removeLastField()">- Remove Last</button>
    </div>

    <div id="container">

        <div class="input-wrapper">
            <input type="number" class="val-input" value="" oninput="calculateTotal()">
        </div>
    </div>

    <div class="result-box">
        Total: <span id="total">0</span>
    </div>
    <footer >
        <i style="color:purple ">Create by: Nel Olino</i> <i class="fas fa-smile"style="color:purple"></i>
    </footer>
  </div>
              <script>
        const container = document.getElementById('container');
        const totalDisplay = document.getElementById('total');

        function addField() {
            const div = document.createElement('div');
            div.className = 'input-wrapper';
            div.innerHTML = '<input type="number" class="val-input" value="" oninput="calculateTotal()">';
            container.appendChild(div);
            calculateTotal(); // Update total after adding
            
        }

        function removeLastField() {
            const fields = container.getElementsByClassName('input-wrapper');
            // Keep at least one input field
            if (fields.length > 1) {
                container.removeChild(fields[fields.length - 1]);
                calculateTotal(); // Update total after removing
            }
        }

        function calculateTotal() {
            let sum = 0;
            const inputs = document.querySelectorAll('.val-input');
            
            inputs.forEach(input => {
                const val = parseFloat(input.value) || 0;
                sum += val;
            });

            totalDisplay.innerText = sum;
        }
    </script>

</body>
</html>
