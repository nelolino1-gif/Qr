<html>

<title>% Percentage Calculator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{
padding:0;
margin:0;
box-sizing:border-box;

}
body {

display: flex;
flex-direction: column;

align-content:center;

        }
.container{
margin-top:25px;
width:330px;
font-size:20px;
border-radius:10px;
display:flex;
flex-direction:column;
padding:5px;
background:;
text-align:center;

box-shadow: 0 6px 8px rgba(0,0,0,0.1);
} 


label{
font-size:15px;
color:brown;
margin-bottom:5px;
}
    
.input-container{
width:100%;
display:flex;
flex-direction:column;
justify-content:center;        
align-items:center;
column-gap:5px;
}       
.input-label{
margin-top:10px;        
width:100%;
display:flex;
flex-direction:column;
justify-content:center;

column-gap:5px;
         
}
input { 
width:92%;
margin:0px;
font-size:15px;
padding: 10px; 
border: 1.5px solid teal;
text-align:center;

border-radius:50px;
            
}
    
input:focus {
outline:2.5px solid #ccc;
border:1.5px solid tomato;
}
    
.result-group{

width:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;    
background:;
row-gap:0px;
}
    
    
.result-container{

width:100%;
display:flex;
flex-direction:row;
align-items:center;
justify-content:center;    
column-gap:0px;    
background:;
             
         
}
    
.result-label { 
width:30%;    
border:1.5px solid teal;    
font-weight: bold;
color: #2c3e50; 
font-size:18px;
background:;
padding :7px 5px;   
border-radius:;    

        }    
    
    
         
.result { 
  
width:30%;    
border:1.5px solid teal;    
font-weight: bold;
color: #2c3e50; 
font-size:18px;
background:;
padding :7px 5px;   
overflow:scroll;        
 

        }
footer{
margin:10px 0px;
font-size:15px;
background:;
font-weight:;
}         
    
    
     
       
    </style>
</head>
<body>

    <div class="container">        
        <div class="input-container">
        <div class="input-label">
        <label for="amount">Amount:</label>                
        <input type="number" id="amount" placeholder="" oninput="calculate()">     
        </div>  
        <div class="input-label">
        <label  for="percent">%Percentage:</label>        
        <input type="number" pattern="[0-9,]*" id="percent" placeholder="" oninput="calculate()">
        </div> 
        </div>    
      
            <label style="margin-top:10px" for="result">Result:</label>                
     
        <div class="result-group">
        <div class="result-container">
    <label style="border-radius:5px 0px 0px 0px"class="result-label">= % : </label> 
    <label  style="border-radius:0px 0px 0px 0px" class="result-label">- % : </label> 
    <label style="border-radius:0px 5px 0px 0px" class="result-label">+ % : </label> 
       </div>  
        <div class="result-container">
        <div style="border-radius:0px 0px 0px 5px" class="result">
         <span     style="color:purple" id="output">0</span>
         </div>
         <div style="border-radius:0px 0px 0px 0px"class="result">
         <span style="color:tomato" id="finalsub">0</span>
         </div>  
        <div style="border-radius:0px 0px 5px 0px" class="result">
        <span style="color:teal" id="finaladd">0</span>
         </div>  
        </div>
        </div>
        <footer>             
       <i style="color:purple">Create by: Nel Olino</i> <i class="fas fa-smile"style="color:purple ;font-size:16px"></i>    
      </footer>        
     </div>
    <script>
        function calculate() {
            const val = document.getElementById('amount').value;
            const percent = document.getElementById('percent').value;
           
            const output = document.getElementById('output');
            const finalsub = document.getElementById('finalsub');
            const finaladd = document.getElementById('finaladd');
            
            if (val) {
                // The formula: Result = Value * 0.98
               // const multiply = ;
                const result = val / 100 * percent ;
                output.innerText = result.toLocaleString();
                
                const sub = val - result
                finalsub.innerText = sub.toLocaleString();
                
                var str = result;
               var num = parseInt(str); 
                var str2 = val;
               var num2 = parseInt(str2); 
                // o parseFloat(str) para sa decimal na numero
               //console.log(num); // output: 123
                const add = num + num2
                finaladd.innerText = add.toLocaleString();

            } else {
                output.innerText = "0";
                finalsub.innerText = "0";
                finaladd.innerText = "0";
            }
        }
        
        

    </script>

</body>
</html>
